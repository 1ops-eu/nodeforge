kind: backup_job

meta:
  name: db-backup
  description: Daily PostgreSQL backup with 7-day retention

host:
  name: prod-node-1
  address: 203.0.113.10
  os_family: debian

login:
  user: admin
  private_key: ~/.ssh/id_ed25519
  port: 2222

backup:
  name: app-db
  source:
    type: postgres_dump
    database: myapp
    host: localhost
    port: 5432
    user: postgres
  destination:
    path: /var/backups/loft-cli
  retention:
    count: 7
  schedule: "*-*-* 02:00:00"

local:
  inventory:
    enabled: true
    db_path: ~/.loft-cli/inventory.db

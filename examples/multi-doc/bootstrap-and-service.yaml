kind: bootstrap

meta:
  name: multi-doc-bootstrap
  description: Bootstrap a fresh node (document 1 of 2)

host:
  name: multi-node
  address: 203.0.113.50
  os_family: debian

login:
  user: root
  private_key: ~/.ssh/id_ed25519
  port: 22

admin_user:
  name: deploy
  groups:
    - sudo
  pubkeys:
    - ~/.ssh/id_ed25519.pub

ssh:
  port: 2222
  disable_root_login: true
  disable_password_auth: true

firewall:
  provider: ufw
  ssh_only: true

local:
  ssh_config:
    enabled: true
    host_alias: multi-node
    config_path: ~/.ssh/config
    preserve_legacy_entry: false

  inventory:
    enabled: true
    db_path: ~/.nodeforge/inventory.db

checks:
  - type: ssh_reachable
    port: 2222
    user: deploy

  - type: port_open
    port: 2222

---

kind: service

meta:
  name: multi-doc-postgres
  description: Install PostgreSQL after bootstrap (document 2 of 2)

host:
  name: multi-node
  address: 203.0.113.50
  os_family: debian

login:
  user: deploy
  private_key: ~/.ssh/id_ed25519
  port: 2222

postgres:
  enabled: true
  version: "16"
  listen_addresses:
    - 127.0.0.1
  create_role:
    name: appuser
    password_env: APP_DB_PASSWORD
  create_database:
    name: appdb
    owner: appuser

local:
  inventory:
    enabled: true
    db_path: ~/.nodeforge/inventory.db

checks:
  - type: postgres_ready

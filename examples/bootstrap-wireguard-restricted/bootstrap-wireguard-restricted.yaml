kind: bootstrap

meta:
  name: wireguard-restricted-bootstrap
  description: Bootstrap with WireGuard VPN and SSH restricted to registered peers only

host:
  name: wg-restricted-node-1
  address: 203.0.113.10
  os_family: debian

login:
  user: root
  private_key: ~/.ssh/id_ed25519
  port: 22

admin_user:
  name: deploy
  groups:
    - sudo
  pubkeys:
    - ~/.ssh/id_ed25519.pub

ssh:
  port: 2222
  disable_root_login: true
  disable_password_auth: true

firewall:
  provider: ufw
  ssh_only: true
  registered_peers_only: true

wireguard:
  enabled: true
  interface: wg0
  address: 10.10.0.1/24
  private_key_file: .secrets/wg.key
  endpoint: vpn.example.com:51820
  peer_address: 10.10.0.2/32
  persistent_keepalive: 25

local:
  ssh_config:
    enabled: true
    host_alias: wg-restricted-node-1
    config_path: ~/.ssh/config
    preserve_legacy_entry: false

  inventory:
    enabled: true
    db_path: ~/.loft-cli/inventory.db

checks:
  - type: ssh_reachable
    port: 2222
    user: deploy

  - type: wireguard_up
    interface: wg0

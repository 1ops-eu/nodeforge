kind: service

meta:
  name: postgres-primary
  description: Install PostgreSQL 16 on an already-bootstrapped node

host:
  name: prod-node-1
  address: 203.0.113.10
  os_family: debian

login:
  user: deploy
  private_key: ~/.ssh/id_ed25519
  port: 2222

postgres:
  enabled: true
  version: "16"
  listen_addresses:
    - 127.0.0.1
    - 10.10.0.2
  create_role:
    name: appuser
    password_env: APP_DB_PASSWORD
  create_database:
    name: appdb
    owner: appuser

local:
  inventory:
    enabled: true
    db_path: ~/.loft-cli/inventory.db

checks:
  - type: postgres_ready

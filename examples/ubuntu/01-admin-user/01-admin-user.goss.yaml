# Static goss reference spec for: examples/ubuntu/01-admin-user.yaml
# loft-cli ships this automatically to ~/.goss/ during `apply`.
# Manual run on the target server:
#   goss -g ~/.goss/goss.yaml validate
#
# Verifies:
#   - admin user exists and belongs to the sudo group
#   - root SSH login is disabled in sshd_config
#   - SSH service is running and listening on port 22
#   - Password authentication is still permitted (not yet disabled at this stage)

user:
  admin:
    exists: true
    groups:
      - sudo
    home: /home/admin
    shell: /bin/bash

file:
  /etc/ssh/sshd_config:
    exists: true
    contains:
      - /^PermitRootLogin\s+no/
    # Password auth is NOT disabled in example 1.1 — verify it is still allowed
    # (absence of a "PasswordAuthentication no" line, or presence of "yes")

service:
  ssh:
    running: true
  # Ensure root login via PAM / su is unaffected (only SSH root login is blocked)

# SSH enabled check: covers socket-activated sshd (Ubuntu 24.04+ ssh.socket),
# traditional Debian/Ubuntu (ssh.service), and Fedora/RHEL (sshd.service).
command:
  "systemctl is-enabled ssh.socket 2>/dev/null || systemctl is-enabled ssh 2>/dev/null || systemctl is-enabled sshd":
    exit-status: 0
    timeout: 5000

port:
  tcp:22:
    listening: true
    ip:
      - "0.0.0.0"

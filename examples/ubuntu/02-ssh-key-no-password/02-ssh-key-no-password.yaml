kind: bootstrap

# Example 1.2: Admin user + SSH key uploaded, password authentication disabled
# Builds on 01-admin-user: the admin user's public key is deployed to
# authorized_keys and password-based SSH login is turned off. Root login
# remains disabled.

meta:
  name: ubuntu-02-ssh-key-no-password
  description: Add SSH public key for admin user and disable password authentication

host:
  name: ubuntu-node-1
  address: 203.0.113.10
  os_family: ubuntu

login:
  user: root
  private_key: ~/.ssh/id_ed25519
  port: 22

admin_user:
  name: admin
  groups:
    - sudo
  pubkeys:
    - ~/.ssh/id_ed25519.pub

ssh:
  port: 22
  disable_root_login: true
  disable_password_auth: true

local:
  ssh_config:
    enabled: true
    host_alias: ubuntu-node-1
    config_path: ~/.ssh/config
    preserve_legacy_entry: false

  inventory:
    enabled: true
    db_path: ~/.loft-cli/inventory.db

checks:
  - type: ssh_reachable
    port: 22
    user: admin

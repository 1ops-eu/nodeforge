# Static goss reference spec for: examples/ubuntu/02-ssh-key-no-password.yaml
# loft-cli ships this automatically to ~/.goss/ during `apply`.
# Manual run on the target server:
#   goss -g ~/.goss/goss.yaml validate
#
# Verifies everything in 01-admin-user, plus:
#   - admin user's authorized_keys file exists and is non-empty
#   - PasswordAuthentication is disabled in sshd_config
#   - PubkeyAuthentication is enabled

user:
  admin:
    exists: true
    groups:
      - sudo
    home: /home/admin
    shell: /bin/bash

file:
  /etc/ssh/sshd_config:
    exists: true
    contains:
      - /^PermitRootLogin\s+no/
      - /^PasswordAuthentication\s+no/
      - /^PubkeyAuthentication\s+yes/

  /home/admin/.ssh/authorized_keys:
    exists: true
    mode: "0600"
    # File must be non-empty (at least one public key was deployed)
    contains:
      - /^(ssh-ed25519|ssh-rsa|ecdsa-sha2-nistp256)\s+/

  /home/admin/.ssh:
    exists: true
    mode: "0700"
    filetype: directory

service:
  ssh:
    running: true

# SSH enabled check: covers socket-activated sshd (Ubuntu 24.04+ ssh.socket),
# traditional Debian/Ubuntu (ssh.service), and Fedora/RHEL (sshd.service).
command:
  "systemctl is-enabled ssh.socket 2>/dev/null || systemctl is-enabled ssh 2>/dev/null || systemctl is-enabled sshd":
    exit-status: 0
    timeout: 5000

port:
  tcp:22:
    listening: true
    ip:
      - "0.0.0.0"

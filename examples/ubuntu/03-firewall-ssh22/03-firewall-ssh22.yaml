kind: bootstrap

# Example 1.3: UFW firewall enabled, SSH on port 22 only
# Builds on 02-ssh-key-no-password: UFW is activated and configured to allow
# only SSH traffic on port 22. All other inbound ports are blocked by default.

meta:
  name: ubuntu-03-firewall-ssh22
  description: Enable UFW firewall allowing only SSH on port 22

host:
  name: ubuntu-node-1
  address: 203.0.113.10
  os_family: ubuntu

login:
  user: root
  private_key: ~/.ssh/id_ed25519
  port: 22

admin_user:
  name: admin
  groups:
    - sudo
  pubkeys:
    - ~/.ssh/id_ed25519.pub

ssh:
  port: 22
  disable_root_login: true
  disable_password_auth: true

firewall:
  provider: ufw
  ssh_only: true

local:
  ssh_config:
    enabled: true
    host_alias: ubuntu-node-1
    config_path: ~/.ssh/config
    preserve_legacy_entry: false

  inventory:
    enabled: true
    db_path: ~/.nodeforge/inventory.db
    key_source: env
    key_env: NODEFORGE_SQLCIPHER_KEY

checks:
  - type: ssh_reachable
    port: 22
    user: admin

  - type: port_open
    port: 22

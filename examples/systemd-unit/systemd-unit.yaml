kind: systemd_unit

meta:
  name: myapp-service
  description: Deploy a host-native application as a systemd service

host:
  name: prod-node-1
  address: 203.0.113.10
  os_family: debian

login:
  user: admin
  private_key: ~/.ssh/id_ed25519
  port: 2222

unit:
  unit_name: myapp
  description: My Application Server
  exec_start: /usr/local/bin/myapp serve --port 8080
  working_directory: /opt/myapp
  user: myapp
  group: myapp
  restart: on-failure
  restart_sec: 5
  after:
    - network.target
    - postgresql.service
  environment:
    APP_ENV: production
    LOG_LEVEL: info
  type: simple
  wanted_by: multi-user.target

logrotate:
  enabled: true
  path: /var/log/myapp/*.log
  rotate: 14
  frequency: daily
  compress: true

local:
  inventory:
    enabled: true
    db_path: ~/.nodeforge/inventory.db

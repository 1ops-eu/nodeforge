kind: bootstrap

meta:
  name: production-node-bootstrap
  description: Harden a fresh Ubuntu node for production self-hosting

host:
  name: prod-node-1
  address: 203.0.113.10
  os_family: debian

login:
  user: root
  private_key: ~/.ssh/id_ed25519
  port: 22

admin_user:
  name: deploy
  groups:
    - sudo
  pubkeys:
    - ~/.ssh/id_ed25519.pub

ssh:
  port: 2222
  disable_root_login: true
  disable_password_auth: true

firewall:
  provider: ufw
  ssh_only: true

wireguard:
  enabled: true
  interface: wg0
  address: 10.10.0.2/24
  private_key_file: .secrets/wg.key
  server_public_key: ABC123DEF456
  endpoint: vpn.example.com:51820
  allowed_ips:
    - 10.10.0.0/24
  persistent_keepalive: 25

local:
  ssh_config:
    enabled: true
    host_alias: prod-node-1
    config_path: ~/.ssh/config
    preserve_legacy_entry: false

  inventory:
    enabled: true
    db_path: ~/.nodeforge/inventory.db

checks:
  - type: ssh_reachable
    port: 2222
    user: deploy

  - type: wireguard_up
    interface: wg0

  - type: port_open
    port: 2222

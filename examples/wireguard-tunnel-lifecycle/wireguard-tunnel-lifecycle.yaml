kind: bootstrap

meta:
  name: wireguard-tunnel-lifecycle
  description: >
    Bootstrap with WireGuard VPN, SSH tunnel safety gate,
    and SSH config pointing through the tunnel.

host:
  name: tunnel-demo-1
  address: 203.0.113.50
  os_family: debian

login:
  user: root
  private_key: ~/.ssh/id_ed25519
  port: 22

admin_user:
  name: deploy
  groups:
    - sudo
  pubkeys:
    - ~/.ssh/id_ed25519.pub

ssh:
  port: 2222
  disable_root_login: true
  disable_password_auth: true

firewall:
  provider: ufw
  ssh_only: true
  registered_peers_only: true

wireguard:
  enabled: true
  interface: wg0
  address: 10.10.0.1/24
  endpoint: 203.0.113.50:51820
  peer_address: 10.10.0.2/32
  persistent_keepalive: 25

local:
  ssh_config:
    enabled: true
    config_path: ~/.ssh/config
  inventory:
    enabled: true

checks:
  - type: ssh_reachable
    port: 2222
    user: deploy

  - type: wireguard_up
    interface: wg0

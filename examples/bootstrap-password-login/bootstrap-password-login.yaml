kind: bootstrap

meta:
  name: password-login-bootstrap
  description: Bootstrap using password-based SSH login (no SSH key required)

host:
  name: password-node-1
  address: 203.0.113.10
  os_family: debian

login:
  user: root
  password: ${env:ROOT_PASSWORD}
  port: 22

admin_user:
  name: deploy
  groups:
    - sudo
  pubkeys:
    - ~/.ssh/id_ed25519.pub

ssh:
  port: 2222
  disable_root_login: true
  disable_password_auth: true

firewall:
  provider: ufw
  ssh_only: true

local:
  ssh_config:
    enabled: true
    host_alias: password-node-1
    config_path: ~/.ssh/config
    preserve_legacy_entry: false

  inventory:
    enabled: true
    db_path: ~/.nodeforge/inventory.db

checks:
  - type: ssh_reachable
    port: 2222
    user: deploy

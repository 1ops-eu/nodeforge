[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nodeforge-agent"
version = "0.5.0"
description = "Server-side agent for nodeforge — executes plans locally on managed servers"
requires-python = ">=3.11"
dependencies = [
    "nodeforge-core>=0.5.0",
    "typer[all]>=0.9.0",
    "rich>=13.0",
]

[project.scripts]
nodeforge-agent = "nodeforge_agent.cli:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["nodeforge_agent*"]

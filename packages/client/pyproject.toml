[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "loft-cli"
version = "0.6.3"
description = "Securely bootstrap Linux servers with auditable plans, generated ops docs, and encrypted local inventory"
requires-python = ">=3.11"
dependencies = [
    "loft-cli-core>=0.5.0",
    "typer[all]>=0.9.0",
    "fabric>=3.2",
    "rich>=13.0",
    "requests>=2.31",
    "pynacl>=1.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-mock>=3.12",
    "pyfakefs>=5.3",
    "ruff>=0.4",
    "black>=24.0",
    "build>=1.0",
    "pyinstaller>=6.0",
]

[project.scripts]
loft-cli = "loft_cli.cli:app"

# Register built-in spec kinds so that load_addons() discovers them
[project.entry-points."loft_cli.addons"]
builtins = "loft_cli._builtins:_register_builtins"

[tool.setuptools.packages.find]
where = ["."]
include = ["loft_cli*"]

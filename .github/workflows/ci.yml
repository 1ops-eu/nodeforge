name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e packages/core -e packages/client -e packages/agent -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/test_smoke -v

      - name: Run smoke tests (validate + plan + docs for all examples)
        run: pytest tests/test_smoke/ -v

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for PyPI trusted publishers (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build all packages
        run: |
          python -m build packages/core
          python -m build packages/client
          python -m build packages/agent

      - name: Check distributions
        run: |
          twine check packages/core/dist/*
          twine check packages/client/dist/*
          twine check packages/agent/dist/*

      - name: Upload core artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-core
          path: packages/core/dist/

      - name: Upload client artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-client
          path: packages/client/dist/

      - name: Upload agent artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-agent
          path: packages/agent/dist/

  publish-core:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download core artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-core
          path: dist/

      - name: Publish loft-cli-core to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-client:
    needs: publish-core  # client depends on core being available
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download client artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-client
          path: dist/

      - name: Publish loft-cli to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-agent:
    needs: publish-core  # agent depends on core being available
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download agent artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-agent
          path: dist/

      - name: Publish loft-cli-agent to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

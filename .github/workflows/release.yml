name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Build client binaries ──────────────────────────────────────────────────
  build-client:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: loft-cli-linux-amd64
            binary_path: dist/loft-cli

          - os: ubuntu-24.04-arm
            artifact_name: loft-cli-linux-arm64
            binary_path: dist/loft-cli

          - os: macos-latest
            artifact_name: loft-cli-macos-arm64
            binary_path: dist/loft-cli

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build binary
        run: python scripts/build_binary.py

      - name: Prepare artifact
        run: |
          mkdir -p release
          cp "${{ matrix.binary_path }}" "release/${{ matrix.artifact_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.artifact_name }}

  # ── Build agent binaries (Linux only — agent runs on servers) ──────────────
  build-agent:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: loft-cli-agent-linux-amd64
            binary_path: dist/loft-cli-agent

          - os: ubuntu-24.04-arm
            artifact_name: loft-cli-agent-linux-arm64
            binary_path: dist/loft-cli-agent

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build agent binary
        run: python scripts/build_agent_binary.py

      - name: Prepare artifact
        run: |
          mkdir -p release
          cp "${{ matrix.binary_path }}" "release/${{ matrix.artifact_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.artifact_name }}

  # ── Generate checksums ──────────────────────────────────────────────────────
  checksums:
    needs: [build-client, build-agent]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Flatten artifact directories
        run: |
          mkdir -p flat
          find release -type f -exec cp {} flat/ \;

      - name: Generate SHA-256 checksums
        run: |
          cd flat
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: flat/checksums.txt

  # ── Publish GitHub Release ──────────────────────────────────────────────────
  publish:
    needs: [build-client, build-agent, checksums]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Flatten artifact directories
        run: |
          mkdir -p final
          find release -type f -exec cp {} final/ \;
          ls -lh final/

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: final/*
          generate_release_notes: true
